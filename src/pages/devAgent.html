
      <section id="devTasksPage" class="app-page hidden">
        <div class="page-heading-row">
          <h2>Tasks</h2>
        </div>
        <div style="display:flex; gap:0.5rem; justify-content: flex-end; margin-bottom: 1rem;">
          <button id="devTasksToggleViewBtn" class="secondary-btn" onclick="App.devAgent.toggleTasksView()">Kanban View</button>
          <button id="devTasksNewTaskBtn" class="primary-btn" onclick="App.devAgent.openTaskEditor()">+ New Task</button>
        </div>
        
        <div id="devTaskBrowserPanel" class="" style="flex-direction: column; width: 100%; height: 100%; padding: 2rem; background: var(--bg-card); overflow-y: auto;">
              <h2 style="margin-top: 0;">Task Directory</h2>
              <div class="filter-row" style="margin-bottom: 1rem; display: flex; gap: 0.5rem;">
                <input type="text" id="devTaskFilterText" placeholder="Search tasks..." style="padding:0.4rem; border-radius:4px; border:1px solid var(--border-light); background:var(--bg-input); color:var(--text-primary); flex:1;" />
                <select id="devTaskFilterStatus" style="padding:0.4rem; border-radius:4px; border:1px solid var(--border-light); background:var(--bg-input); color:var(--text-primary);">
                  <option value="all">All Statuses</option>
                  <option value="backlog">Backlog</option>
                  <option value="todo">Todo</option>
                  <option value="in_progress">In Progress</option>
                  <option value="review">Review</option>
                  <option value="completed">Completed</option>
                </select>
                <select id="devTaskFilterPriority" style="padding:0.4rem; border-radius:4px; border:1px solid var(--border-light); background:var(--bg-input); color:var(--text-primary);">
                  <option value="all">All Priorities</option>
                  <option value="low">Low</option>
                  <option value="medium">Medium</option>
                  <option value="high">High</option>
                  <option value="critical">Critical</option>
                </select>
                <select id="devTaskFilterProject" style="padding:0.4rem; border-radius:4px; border:1px solid var(--border-light); background:var(--bg-input); color:var(--text-primary);">
                  <option value="all">All Projects</option>
                </select>
              </div>
              <div class="table-wrap">
                <table class="data-table" style="width: 100%;">
                  <thead>
                    <tr><th style="text-align:left;">ID</th><th style="text-align:left;">Title</th><th>Project</th><th>Status</th><th>Priority</th><th>Assignee</th><th>Created</th><th>Actions</th></tr>
                  </thead>
                  <tbody id="devTaskBrowserTable"></tbody>
                </table>
              </div>
            </div>
        <div id="devTaskEditorPanel" class="hidden" style="display: flex; flex-direction: row; width: 100%; height: 100%; background: var(--bg-card); overflow: hidden;">
              <div style="flex: 1; padding: 2rem; overflow-y: auto;">
                <h2 id="devTaskEditorHeader" style="margin-top: 0;">Task Details</h2>
                <form id="devTaskEditorForm" class="standard-form-grid" style="max-width: 800px;">
                  <input type="hidden" id="devEditTaskId" />
                  <div class="form-group full-width">
                    <label for="devEditTaskTitle">Title</label>
                    <input type="text" id="devEditTaskTitle" required />
                  </div>
                  <div class="form-group full-width">
                    <label for="devEditTaskDesc">Description</label>
                    <textarea id="devEditTaskDesc" style="min-height: 120px;"></textarea>
                  </div>
                  <div class="form-group">
                    <label for="devEditTaskStatus">Status</label>
                    <select id="devEditTaskStatus">
                      <option value="backlog">Backlog</option>
                      <option value="todo">Todo</option>
                      <option value="in_progress">In Progress</option>
                      <option value="review">Review</option>
                      <option value="completed">Completed</option>
                    </select>
                  </div>
                  <div class="form-group">
                    <label for="devEditTaskPriority">Priority</label>
                    <select id="devEditTaskPriority">
                      <option value="low">Low</option>
                      <option value="medium">Medium</option>
                      <option value="high">High</option>
                      <option value="critical">Critical</option>
                    </select>
                  </div>
                  <div class="form-group">
                    <label for="devEditTaskAssignee">Assignee</label>
                    <select id="devEditTaskAssignee">
                      <option value="mentor">Mentor</option>
                      <option value="roger">Roger</option>
                      <option value="antigravity">Antigravity</option>
                    </select>
                  </div>
                  <div class="form-actions full-width" style="margin-top: 1rem;">
                    <button type="submit" class="primary-btn">Save Changes</button>
                    <button type="button" id="devCloseTaskEditorBtn" class="secondary-btn">Close Editor</button>
                    <button type="button" id="devTaskNewThreadBtn" class="secondary-btn hidden" onclick="App.devAgent.createThreadForTask()">Start Discussion</button>
                  </div>
                </form>
              </div>
              <div style="width: 450px; display: flex; flex-direction: column; border-left: 1px solid var(--border-light); background: var(--bg-card);">
                <div style="padding: 1rem; border-bottom: 1px solid var(--border-light); display: flex; justify-content: space-between; align-items: center;">
                  <h3 style="margin: 0; font-size: 1.1rem;">Discussion & Context</h3>
                </div>
                <div id="devTaskProjectContext" style="padding: 1rem; border-bottom: 1px solid var(--border-light); font-size: 0.9rem;"></div>
                <div id="devTaskChatContainer" style="flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative;"></div>
              </div>
            </div>
        <div id="devDashboardKanban" class="kanban-board hidden" style="width: 100%; height: 100%; padding: 2rem; background: var(--bg-card); overflow-x: auto; display: none;">
          <div class="kanban-column" id="kanbanBacklog">
            <h3 class="kanban-column-header">Backlog <span class="kanban-count" id="countBacklog">0</span></h3>
            <div class="kanban-column-body" id="colBacklog" ondragover="App.devAgent.handleDragOver(event)" ondragleave="App.devAgent.handleDragLeave(event)" ondrop="App.devAgent.handleDrop(event, 'backlog')"></div>
          </div>
          <div class="kanban-column" id="kanbanTodo">
            <h3 class="kanban-column-header">Todo <span class="kanban-count" id="countTodo">0</span></h3>
            <div class="kanban-column-body" id="colTodo" ondragover="App.devAgent.handleDragOver(event)" ondragleave="App.devAgent.handleDragLeave(event)" ondrop="App.devAgent.handleDrop(event, 'todo')"></div>
          </div>
          <div class="kanban-column" id="kanbanInProgress">
            <h3 class="kanban-column-header">In Progress <span class="kanban-count" id="countInProgress">0</span></h3>
            <div class="kanban-column-body" id="colInProgress" ondragover="App.devAgent.handleDragOver(event)" ondragleave="App.devAgent.handleDragLeave(event)" ondrop="App.devAgent.handleDrop(event, 'in_progress')"></div>
          </div>
          <div class="kanban-column" id="kanbanReview">
            <h3 class="kanban-column-header">Review <span class="kanban-count" id="countReview">0</span></h3>
            <div class="kanban-column-body" id="colReview" ondragover="App.devAgent.handleDragOver(event)" ondragleave="App.devAgent.handleDragLeave(event)" ondrop="App.devAgent.handleDrop(event, 'review')"></div>
          </div>
          <div class="kanban-column" id="kanbanCompleted">
            <h3 class="kanban-column-header">Completed <span class="kanban-count" id="countCompleted">0</span></h3>
            <div class="kanban-column-body" id="colCompleted" ondragover="App.devAgent.handleDragOver(event)" ondragleave="App.devAgent.handleDragLeave(event)" ondrop="App.devAgent.handleDrop(event, 'completed')"></div>
          </div>
      </section>
      <section id="devForumPage" class="app-page hidden">
        <div class="page-heading-row" style="display: flex; justify-content: space-between; align-items: center;">
          <h2 style="flex:1;">Dev: Forum</h2>
          <div style="display:flex; align-items:center; flex:1; justify-content:center;">
            <span id="devSearchCount" style="margin-left:0.5rem; font-size:0.8rem; color:#6b7280; white-space:nowrap;"></span>
          </div>
          <div style="display: flex; gap: 0.5rem; flex:1; justify-content: flex-end;">
                <button id="devTestBtn" class="secondary-btn tiny-btn hidden" style="position:absolute; top:-34px; right:0; padding:0.2rem 0.6rem; font-size: 0.75rem;">Test Connection</button>
                <button id="devNewSessionBtn" class="primary-btn" style="padding:0.4rem 0.75rem; font-size:0.85rem; white-space:nowrap;">+ New Thread</button>
                <button id="devNewTaskBtn" class="primary-btn" style="padding:0.4rem 0.75rem; font-size:0.85rem; white-space:nowrap;">+ New Task</button>
                <button id="devFrictionToggleBtn" class="primary-btn" style="padding:0.4rem 0.75rem; font-size:0.85rem; white-space:nowrap;">Friction</button>
              </div>
        </div>
        <div class="dev-chat-container" style="display: flex; flex-direction: row; gap: 0; height: calc(100vh - 120px);">
          <div id="devThreadsAccordionContainer" style="flex: 1; min-width: 0; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.5rem; background: var(--bg-main);">
            <div style="padding: 1rem; text-align: center; color: #666; font-style: italic;">Loading threads...</div>
          </div>
          
          <template id="devChatFormTemplate">
            <form class="dev-chat-input-area dev-inline-chat-form" style="margin-top: 1rem; border-top: 1px solid var(--border-light); padding-top: 1rem;">
              <div class="dev-chat-attachments-container" style="display:flex; flex-direction:column; gap:4px; margin-bottom:8px; align-self:flex-start;"></div>
              <div class="dev-chat-input-row" style="display: flex; gap: 8px; width: 100%;">
                <button type="button" class="secondary-btn dev-file-trigger-btn" title="Attach file" aria-label="Attach file">📎</button>
                <input type="file" class="hidden dev-chat-file" accept=".md,.txt,.csv,.json,text/markdown,text/plain,image/*,video/*,audio/*,application/pdf,.doc,.docx,.xls,.xlsx,.zip" />
                <textarea class="dev-chat-input" placeholder="Message Dev Agent..."></textarea>
                <button type="submit" class="primary-btn dev-chat-submit-btn">Send</button>
              </div>
            </form>
          </template>
          </template>
          <div id="devForumRightColumn" style="flex: 1; display: flex; flex-direction: column; border-left: 1px solid var(--border-light); overflow: hidden; background: var(--bg-card);">
            <div id="devAllMessagesPanel" style="flex: 1; display: flex; flex-direction: column; overflow-y: hidden; height: 100%;">
              <div style="padding: 1rem; border-bottom: 1px solid var(--border-light); display: flex; justify-content: space-between; align-items: center;">
                <h3 style="margin: 0; font-size: 1.1rem;">System Messages</h3>
                <input type="text" id="devAllMessagesFilter" placeholder="Filter messages..." oninput="App.devAgent.filterAllMessages()" style="padding: 0.4rem; border-radius: 4px; border: 1px solid #888; background: var(--bg-input); color: var(--text-primary); width: 250px;" />
              </div>
              <div class="table-wrap" style="flex: 1; overflow-y: auto; padding: 0;">
                <table class="data-table" style="width: 100%; font-size: 0.85rem; border-collapse: collapse;">
                  <thead style="position: sticky; top: 0; background: var(--bg-card); z-index: 10;">
                    <tr>
                      <th style="cursor: pointer;" onclick="App.devAgent.sortAllMessages('created_at')">Date/Time</th>
                      <th style="cursor: pointer;" onclick="App.devAgent.sortAllMessages('task_title')">Task Title</th>
                      <th style="cursor: pointer;" onclick="App.devAgent.sortAllMessages('sender')">Sender</th>
                      <th style="cursor: pointer;" onclick="App.devAgent.sortAllMessages('receiver')">Receiver</th>
                      <th>Message</th>
                    </tr>
                  </thead>
                  <tbody id="devAllMessagesTableBody">
                    <tr><td colspan="5" style="text-align: center; color: #666; font-style: italic;">Loading messages...</td></tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </section>
