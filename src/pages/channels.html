
      <section id="channelsPage" class="app-page hidden">
        <div class="page-heading-row">
          <h2 id="channelsPageHeading">Channels</h2>
          <div class="page-heading-actions">
            <button type="button" onclick="App.channels.openChannelsPage(); return false;" class="btn">Refresh</button>
          </div>
        </div>
        <p id="channelsPageSubtitle" class="meta">Connect social accounts used for outreach. Create channels on the left; browse and filter existing channels on the right.</p>

        <div class="channels-page-layout">
          <section id="channelsCreatePanel" class="channels-page-panel">
            <h3>Create Channel</h3>
            <form id="channelForm" class="standard-form-grid" onsubmit="App.channels.submitChannelCreate(event); return false;">
              <label for="channelPlatformInput">Platform</label>
              <select id="channelPlatformInput" name="channel" required>
                <option value="">Select platform</option>
              </select>

              <label for="channelUserNameInput">User Name</label>
              <input id="channelUserNameInput" name="user_name" required />

              <label for="channelEmailInput">Email</label>
              <input id="channelEmailInput" name="email" type="email" />

              <label for="channelPasswordInput">Password</label>
              <input id="channelPasswordInput" name="password" type="password" />

              <label id="channelTypeAssignLabel" class="hidden" for="channelTypeAssign">Virtual Personality</label>
              <select id="channelTypeAssign" name="contact_id" class="hidden"></select>

              <div></div>
              <button type="submit" class="btn btn-primary">Save Channel</button>
            </form>
          </section>

          <section id="channelsListPanel" class="channels-page-panel">
            <h3>Existing Channels</h3>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr class="table-filter-row">
                    <th>
                      <div class="channels-platform-cell channels-platform-filter-cell">
                        <img
                          id="channelsFilterPlatformIcon"
                          class="channels-platform-icon"
                          src="/images/logos/web.svg"
                          alt=""
                          aria-hidden="true"
                        />
                        <select id="channelsFilterPlatform" aria-label="Filter by platform">
                          <option value="">All Platforms</option>
                        </select>
                      </div>
                    </th>
                    <th></th>
                    <th></th>
                    <th></th>
                    <th></th>
                  </tr>
                  <tr>
                    <th>
                      <div class="channels-platform-cell channels-platform-heading-cell">
                        <img
                          class="channels-platform-icon"
                          src="/images/logos/web.svg"
                          alt=""
                          aria-hidden="true"
                        />
                        <strong class="channels-platform-name">Platform</strong>
                      </div>
                    </th>
                    <th>User Name</th>
                    <th>Email</th>
                    <th>Password</th>
                    <th class="channels-actions-heading">Actions</th>
                  </tr>
                </thead>
                <tbody id="channelsTable"></tbody>
              </table>
            </div>
          </section>
        </div>
      </section>
      <section id="editChannelPage" class="app-page hidden">
        <div class="page-heading-row">
          <h2>Edit Channel</h2>
          <div class="page-heading-actions">
            <button id="backFromEditChannelBtn" type="button" onclick="App.channels.openChannelsPage(); return false;" class="btn">Back To Channels</button>
          </div>
        </div>
        <form id="channelEditForm" class="standard-form-grid" onsubmit="App.channels.submitChannelEdit(event); return false;">
          <input id="channelEditId" name="id" type="hidden" />

          <label for="channelEditPlatformInput">Platform</label>
          <select id="channelEditPlatformInput" name="channel" required>
            <option value="">Select platform</option>
          </select>

          <label for="channelEditUserNameInput">User Name</label>
          <input id="channelEditUserNameInput" name="user_name" required />

          <label for="channelEditEmailInput">Email</label>
          <input id="channelEditEmailInput" name="email" type="email" required />

          <label for="channelEditPasswordInput">Password</label>
          <input id="channelEditPasswordInput" name="password" type="password" />

          <label id="channelEditTypeAssignLabel" class="hidden" for="channelEditTypeAssign">Virtual Personality</label>
          <select id="channelEditTypeAssign" name="contact_id" class="hidden"></select>

          <div></div>
          <button type="submit" class="btn btn-primary">Update Channel</button>
        </form>
      </section>
