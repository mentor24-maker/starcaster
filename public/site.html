<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading…</title>
  <!-- Strips internal /api/* paths from the address bar when fallback routing was used -->
  <script>
    (function cleanPublicUrl() {
      var path = window.location.pathname || '';
      var search = window.location.search || '';
      if (path.indexOf('/api/_site/') === 0) {
        var params = new URLSearchParams(search);
        var target = params.get('path') || '/';
        try { history.replaceState(null, '', target); } catch (e) { /* ignore */ }
        return;
      }
      if (path === '/api/index' || path === '/api/index/') {
        try { history.replaceState(null, '', '/' + search); } catch (e) { /* ignore */ }
        return;
      }
      if (path.indexOf('/api/') === 0) {
        var slugPath = path.slice(4) || '/';
        if (slugPath.indexOf('public/') === 0 || slugPath.indexOf('_site/') === 0) return;
        try { history.replaceState(null, '', slugPath + search); } catch (e) { /* ignore */ }
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Poppins:wght@400;500;600;700;800&family=Montserrat:wght@400;500;600;700;800;900&family=Oswald:wght@400;500;600;700&family=Archivo:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&family=Bebas+Neue&family=Playfair+Display:wght@400;500;600;700;800;900&family=Merriweather:wght@400;700;900&family=Lora:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="/styles.css?v=78e9aac3" />
</head>
<body>
  <div id="siteRoot"></div>
  <script src="/builder-bundle.js?v=fcc3e274"></script>
  <script>
    try {
      window.BuilderReact.mountPublicSite(document.getElementById('siteRoot'));
    } catch (err) {
      var root = document.getElementById('siteRoot');
      if (root) {
        root.innerHTML = '<p style="padding:2rem;font-family:sans-serif;color:#333">Unable to load this page. Please refresh.</p>';
      }
      console.error('Public site mount failed:', err);
    }
  </script>
</body>
</html>
