<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading…</title>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: #fff; color: #333; }
    .boot { padding: 2rem; text-align: center; }
  </style>
  <script>
    (function () {
      var h = window.location.hostname;
      var sys = /^(localhost|127\.0\.0\.1|0\.0\.0\.0)$/.test(h)
        || h.endsWith('.vercel.app')
        || h === 'starcaster.pro'
        || h.endsWith('.starcaster.pro');
      var p = window.location.pathname || '/';
      if (p.indexOf('/api/_site/') === 0) {
        var params = new URLSearchParams(window.location.search || '');
        window.location.replace(params.get('path') || '/');
        return;
      }
      if (sys) {
        window.location.replace('/app-shell.html');
        return;
      }
      window.location.replace('/');
    })();
  </script>
</head>
<body>
  <div class="boot">Loading site…</div>
</body>
</html>
