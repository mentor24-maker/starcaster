name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  # Playwright is a devDependency used only by local tooling — skip the
  # ~100MB browser download in CI.
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (builder UI)
        run: npx vitest run

      # Build BEFORE the server-lib tests: those tests exercise the
      # generated lib/builder bundles, which are gitignored and only
      # exist after a build.
      - name: Full production build
        run: npm run build

      # `npm run build` re-pins ?v= hashes from the artifacts it just built,
      # so any change here means the COMMITTED HTML shells pinned a hash that
      # this source does not actually build to. That ships a stale
      # cache-buster: browsers keep serving the old CSS/JS to returning
      # visitors even though the new file deployed fine.
      - name: Asset pins match a clean build
        run: |
          if ! git diff --exit-code -- '*.html'; then
            echo "::error::Committed ?v= asset pins are stale (see diff above). Fix: run 'npm run build' locally and commit the updated HTML shells."
            exit 1
          fi

      - name: Unit tests (builder server libs)
        run: npm run test:builder

      - name: Convention checks (advisory)
        # Non-blocking until the 6 pre-existing button-in-<th> violations
        # are cleaned up; then drop continue-on-error to make it a gate.
        continue-on-error: true
        run: node scripts/check_conventions.cjs --all
