<!DOCTYPE html>
<html>
<head>
<style>
.dev-sessions-sidebar {
  width: 320px;
  background: white;
  border-right: 1px solid #ccc;
  display: flex;
  flex-direction: column;
}

.sidebar-section-header {
  display: flex;
  justify-content: space-between;
  align-items: stretch;
  width: 100%;
  padding: 0;
  margin-top: 0;
  background-color: #111;
  color: #fff;
  border: none;
  font-size: 0.85rem;
  font-weight: 600;
  text-transform: capitalize;
  border-radius: 10px;
  margin-bottom: 2px;
}

.sidebar-nav-link {
  color: inherit;
  text-decoration: none;
  text-align: left;
  display: flex;
  align-items: center;
  flex: 1;
  padding: 0.5rem 0 0.5rem 1rem;
  cursor: pointer;
  background: red; /* so I can see it */
}

.sidebar-section-chevron {
  background: blue; /* so I can see it */
  border: none;
  color: inherit;
  padding: 0.5rem 1rem 0.5rem 1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  outline: none;
}
</style>
</head>
<body>
  <aside class="dev-sessions-sidebar">
    <div class="sidebar-section-header">
      <a href="#" class="sidebar-nav-link" data-nav="tasks">Tasks</a>
      <button class="sidebar-section-chevron">v</button>
    </div>
  </aside>
</body>
</html>
