<!--
  ============================================================
  TWO changes needed in index.html
  ============================================================

  CHANGE 1 — Add a "Comments" button to the YouTube page header.
  Find the heading row for the YouTube page (look for gatherYoutubePage
  and its h2 or page-heading-row). Add the button alongside any
  existing buttons in that header. It should look something like:

  Find this pattern (your YouTube page heading):
    <div class="page-heading-row">
      <h2>YouTube Harvest</h2>
      ... existing buttons ...
    </div>

  Add this button inside that div, alongside the others:
    <button type="button" onclick="App.setActivePage('youtubeCommentsPage')">Comments</button>


  ============================================================
  CHANGE 2 — Add the dedicated Comments page.
  Paste this entire block as a NEW sibling div alongside your
  other page divs (e.g. next to gatherYoutubePage, addContactPage, etc.)
  ============================================================
-->

<div id="youtubeCommentsPage" class="page" style="display:none;">
  <div class="page-heading-row">
    <h2>YouTube Comments</h2>
    <button type="button" id="commentsPageBackBtn">← Back to YouTube</button>
  </div>

  <!-- Video info -->
  <div style="margin-bottom: 16px; padding: 12px; background: #f5f5f5; border-radius: 6px;">
    <strong id="commentsPageVideoTitle">-</strong>
    <span style="margin-left: 16px; color: #666;" id="commentsPageChannel"></span>
    <span style="margin-left: 16px; color: #888; font-size: 0.9em;" id="commentsPageCount"></span>
  </div>

  <!-- Filters -->
  <div style="display:flex; gap:12px; align-items:center; margin-bottom:12px; flex-wrap:wrap;">
    <input type="text" id="commentSearchFilter" placeholder="Search author or text..." style="width:240px;">
    <select id="commentTypeFilter">
      <option value="all">All comments</option>
      <option value="top">Top-level only</option>
      <option value="reply">Replies only</option>
    </select>
    <input type="number" id="commentMinLikesFilter" placeholder="Min likes" style="width:100px;" min="0">
    <span style="color:#888; font-size:0.9em;">Showing: <span id="commentsFilteredCount">0</span></span>
  </div>

  <!-- Comments table -->
  <div class="table-wrap">
    <table class="data-table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Author</th>
          <th>Comment</th>
          <th>Type</th>
          <th>Likes</th>
          <th>Replies</th>
        </tr>
      </thead>
      <tbody id="commentsTable"></tbody>
    </table>
  </div>
</div>
